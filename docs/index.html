<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Starmap-SVG Web</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  <style>
    :root{
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #eef2f8;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe2ee;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --input-bg: #ffffff;
      --input-text: #0f172a;
      --shadow: 0 8px 24px rgba(15,23,42,.08);
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg: #0b1220;
        --panel: #111a2e;
        --panel-2: #0f172a;
        --text: #e5e7eb;
        --muted: #9aa7bd;
        --border: #263248;
        --accent: #7c8cff;
        --accent-hover: #9aa7ff;
        --input-bg: #0b1324;
        --input-text: #e5e7eb;
        --shadow: 0 10px 28px rgba(0,0,0,.35);
      }
    }

    * { box-sizing: border-box; }

    body {
      font-family: Inter, Segoe UI, Arial, sans-serif;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,140,255,.14), transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, rgba(56,189,248,.10), transparent 50%),
        var(--bg);
    }

    .wrap{
      max-width: 960px;
      margin: 24px auto;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    h1{
      margin: 0 0 12px 0;
      font-size: 1.2rem;
      letter-spacing: .2px;
    }

    #map {
      height: 360px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      align-items: center;
    }

    .row > label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: .95rem;
    }

    input, button, a#download {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--input-text);
      padding: 8px 10px;
      font-size: .92rem;
      text-decoration: none;
    }

    input[type="text"], input[type="number"], input[type="date"], input[type="time"] {
      min-height: 38px;
    }

    input:focus, button:focus, a#download:focus {
      outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
      outline-offset: 1px;
    }

    button, a#download {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      cursor: pointer;
      font-weight: 600;
    }

    .zoom-out-controls {
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) auto auto;
      column-gap: 8px;
      row-gap: 4px;
      align-items: center;
      min-width: 320px;
    }

    .zoom-out-controls input[type="range"] {
      grid-column: 2;
      min-height: 24px;
      padding: 0;
    }

    .zoom-out-left { grid-column: 1; }
    .zoom-out-right { grid-column: 3; }

    .zoom-out-hint {
      font-size: .82rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #zoom-out-readout {
      grid-column: 4;
      min-width: 54px;
      text-align: right;
      font-weight: 600;
      color: var(--text);
    }

    .zoom-out-ticks {
      grid-column: 2;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.1;
      margin-top: 2px;
    }

    .zoom-out-ticks span {
      text-align: center;
    }

    button:hover, a#download:hover {
      background: var(--accent-hover);
    }

    a#download[aria-disabled="true"] {
      pointer-events: none;
      opacity: .5;
      cursor: not-allowed;
    }

    #preview {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      min-height: 120px;
      background: var(--panel-2);
    }

    details {
      margin: 12px 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
    }

    summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
    }

    input[type="color"] {
      width: 44px;
      height: 38px;
      padding: 4px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Starmap=SVG Web</h1>
    <h3>Generate custom starmap SVGs for any location and time, right in your browser.</h3>
    <h4>A Java port of <a href="https://github.com/skeletor-git/starmap-svg" target="_blank">Starmap-SVG by Skeletor-git</a></h4>
    <div class="row">
      <input id="search" placeholder="Search city/place" size="32" />
    </div>

    <div id="map"></div>

    <div class="row">
      <label>Coordinates:
        <input id="coord" placeholder="lat,lon" value="60.186,24.959" />
      </label>
      <!-- User-friendly pickers -->
      <label>Date:
        <input id="datePicker" type="date" />
      </label>
      <label>Time:
        <input id="timePicker" type="time" step="1" />
      </label>
      <label>UTC Offset:
        <input id="utc" type="number" step="0.5" value="0" title="UTC offset" />
      </label>
      <label>Info:
        <input id="info" placeholder="Info text (optional)" />
      </label>
    </div>
    <div class="row" style="margin-top:10px;">
      <label><input id="guides" type="checkbox" /> guides</label>
      <label><input id="constellation" type="checkbox" /> constellation</label>
      <label><input type="checkbox" id="show-border" /> border</label>
      <label><input type="checkbox" id="star-shape" /> star shapes</label>
      <label>Zoom
          <span class="zoom-out-controls">
            <span class="zoom-out-hint zoom-out-left">out</span>
            <input id="zoom-out" type="range" min="2" max="3" step="0.1" value="2.5" list="zoom-slider-ticks" title="Left is most zoomed out, right is most zoomed in" />
            <span class="zoom-out-hint zoom-out-right">in</span>
            <!--<span id="zoom-out-readout">2.5</span>
            <span class="zoom-out-ticks" aria-hidden="true">
              <span>-1</span>
              <span>0</span>
              <span>1</span>
            </span>-->
          </span>
          <datalist id="zoom-slider-ticks">
            <option value="2"></option>
            <option value="2.5"></option>
            <option value="3"></option>
          </datalist>
        </label>
    </div>
    <details>
      <summary>Advanced options</summary>
      <div class="row" style="margin-top:10px;">
        <label><input id="summertime" type="checkbox" /> summertime</label>
        <!--<label><input id="fullview" type="checkbox" /> fullview</label>-->
        <label><input id="light" type="checkbox" /> light theme</label>
        <label><input id="no-info" type="checkbox" /> no info</label>
      </div>

      <div class="row">
        <label>Magnitude
          <input id="magn" type="number" step="0.1" value="5.7" title="Magnitude limit" />
        </label>
        <label>Aperture
          <input id="aperture" type="number" step="0.1" value="0.4" title="Star size aperture" />
        </label>
        <label>
          Star points
          <input id="star-points" type="number" min="3" max="12" step="1" value="4" disabled />
        </label>
      </div>
      <div class="row">
        <label>Width
          <input id="width" type="number" step="1" value="800" title="Output width" />
        </label>
        <label>Height
          <input id="height" type="number" step="1" value="800" title="Output height" />
        </label>
      </div>

      <div class="row">
        <label>
          <input id="bg-color" type="color" value="#2d3b62" />
          Background
        </label>
      </div>

      <div class="row">
        <label>
          <input id="star-color" type="color" value="#ffffff" />
          Stars
        </label>
      </div>

      <div class="row">
        <label>
          <input id="guide-color" type="color" value="#cfd6ff" />
          Guides
        </label>
      </div>

      <div class="row">
        <label>
          <input id="constellation-color" type="color" value="#ffffff" />
          Constellation
        </label>
      </div>

      <div class="row">
        <label>
          <input id="border-color" type="color" value="#ffffff" />
          Border
        </label>
      </div>

      <div class="row">
        <label>
          <input id="text-color" type="color" value="#ffffff" />
          Text
        </label>
      </div>

    </details>

    <div class="row">
      <button id="generate">Generate SVG</button>
      <a id="download" download="starmap.svg" aria-disabled="true">Download</a>
    </div>

    <div id="preview"></div>
  </main>
  <script src="app.js"></script>
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBh0ZOoRiOk40Ny_1FczvOU9QQK0eYvyvk&libraries=places&loading=async&callback=initMap&v=weekly">
  </script>
</body>
</html>
