<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Starmap-SVG Web</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@400;600&family=Merriweather:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@400;700&family=Manrope:wght@400;600&family=DM+Sans:wght@400;700&family=Nunito:wght@400;700&family=Lora:wght@400;700&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;600&family=Poppins:wght@400;600&family=Oswald:wght@400;600&family=Inconsolata:wght@400;600&display=swap"
  />
  <style>
    :root{
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #eef2f8;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe2ee;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --input-bg: #ffffff;
      --input-text: #0f172a;
      --shadow: 0 8px 24px rgba(15,23,42,.08);
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg: #0b1220;
        --panel: #111a2e;
        --panel-2: #0f172a;
        --text: #e5e7eb;
        --muted: #9aa7bd;
        --border: #263248;
        --accent: #7c8cff;
        --accent-hover: #9aa7ff;
        --input-bg: #0b1324;
        --input-text: #e5e7eb;
        --shadow: 0 10px 28px rgba(0,0,0,.35);
      }
    }

    * { box-sizing: border-box; }

    body {
      font-family: Inter, Segoe UI, Arial, sans-serif;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,140,255,.14), transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, rgba(56,189,248,.10), transparent 50%),
        var(--bg);
    }

    .wrap{
      max-width: 960px;
      margin: 24px auto;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    h1{
      margin: 0 0 12px 0;
      font-size: 1.2rem;
      letter-spacing: .2px;
    }

    #map {
      height: 360px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .search-wrap {
      position: relative;
    }

    #search-suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      z-index: 1200;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      max-height: 260px;
      overflow-y: auto;
      display: none;
    }

    #search-suggestions button {
      width: 100%;
      text-align: left;
      border: 0;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      padding: 10px;
      font-weight: 500;
    }

    #search-suggestions button:last-child {
      border-bottom: 0;
    }

    #search-suggestions button:hover {
      background: var(--panel-2);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      align-items: center;
    }

    .row > label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: .95rem;
    }

    input, select, button, a#download {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--input-text);
      padding: 8px 10px;
      font-size: .92rem;
      text-decoration: none;
    }

    input[type="text"], input[type="number"], input[type="date"], input[type="time"], select {
      min-height: 38px;
    }

    input:focus, select:focus, button:focus, a#download:focus {
      outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
      outline-offset: 1px;
    }

    button, a#download {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      cursor: pointer;
      font-weight: 600;
    }

    .zoom-out-controls {
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) auto auto;
      column-gap: 8px;
      row-gap: 4px;
      align-items: center;
      min-width: 320px;
    }

    .zoom-out-controls input[type="range"] {
      grid-column: 2;
      min-height: 24px;
      padding: 0;
    }

    .zoom-out-left { grid-column: 1; }
    .zoom-out-right { grid-column: 3; }

    .zoom-out-hint {
      font-size: .82rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #zoom-out-readout {
      grid-column: 4;
      min-width: 54px;
      text-align: right;
      font-weight: 600;
      color: var(--text);
    }

    .zoom-out-ticks {
      grid-column: 2;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.1;
      margin-top: 2px;
    }

    .zoom-out-ticks span {
      text-align: center;
    }

    button:hover, a#download:hover {
      background: var(--accent-hover);
    }

    a#download[aria-disabled="true"] {
      pointer-events: none;
      opacity: .5;
      cursor: not-allowed;
    }

    #preview {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      min-height: 120px;
      background: var(--panel-2);
    }

    #preview svg {
      display: block;
      max-width: 100%;
      height: auto;
    }

    details {
      margin: 12px 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
    }

    summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
    }

    input[type="color"] {
      width: 44px;
      height: 38px;
      padding: 4px;
    }

    .color-palette-layout {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
      align-items: start;
    }

    .palette-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .import-status {
      font-size: .85rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .info-font-preview {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--panel);
      color: var(--text);
      display: flex;
      align-items: center;
      line-height: 1.25;
    }

    @media (max-width: 760px) {
      .color-palette-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Starmap-SVG Web</h1>
    <h3>Generate custom starmap SVGs for any location and time, right in your browser.</h3>
    <!--<h4>A Java port of <a href="https://github.com/skeletor-git/starmap-svg" target="_blank">Starmap-SVG by Skeletor-git</a></h4>-->
    <div class="row search-wrap" id="search-host">
      <input id="search" placeholder="Search city/place" size="32" />
      <div id="search-suggestions" role="listbox" aria-label="Search suggestions"></div>
    </div>

    <div id="map"></div>

    <div class="row">
      <label title="Latitude and longitude for the star map center point.">Coordinates:
        <input id="coord" placeholder="lat,lon" value="60.186,24.959" />
      </label>
      <!-- User-friendly pickers -->
      <label title="Local calendar date used for sky calculation.">Date:
        <input id="datePicker" type="date" />
      </label>
      <label title="Local time used for sky calculation.">Time:
        <input id="timePicker" type="time" step="1" />
      </label>
      <label title="Optional caption shown in the map text area.">Info:
        <input id="info" placeholder="Info text (optional)" />
      </label>
    </div>
    <div class="row" style="margin-top:10px;">
      <label title="Show equatorial guide lines."><input id="guides" type="checkbox" /> guides</label>
      <label title="Draw constellation connection lines."><input id="constellation" type="checkbox" /> constellation</label>
      <label title="Draw outer border circle (and blank-circle border when enabled)."><input type="checkbox" id="show-border" /> border</label>        <label title="Hide the bottom-left text annotation on the output."><input id="no-info" type="checkbox" /> no info</label>      
      <label title="Render larger stars as star-shaped symbols instead of circles."><input type="checkbox" id="star-shape" /> star shapes</label>
    </div>
    <div class="row">
        <label title="Physical output width in millimeters.">Width (mm)
          <input id="width" type="number" min="1" step="1" value="200" title="Output width in millimeters" />
        </label>
        <label title="Physical output height in millimeters.">Height (mm)
          <input id="height" type="number" min="1" step="1" value="200" title="Output height in millimeters" />
        </label>
    </div>
    <details>
      <summary>Advanced options</summary>
      <div class="row" style="margin-top:10px;">
        <label title="Automatically detected daylight saving time status for the selected date and location."><input id="summertime" type="checkbox" disabled aria-disabled="true" /> summertime</label>
        <!--<label><input id="fullview" type="checkbox" /> fullview</label>-->
        <label title="Timezone offset from UTC for the selected date and location.">UTC Offset:
        <input id="utc" type="number" step="0.5" value="0" title="UTC offset" />
      </label>
      </div>

      <div class="row">
        <label title="Maximum visible star magnitude. Higher values include dimmer stars.">Magnitude
          <input id="magn" type="number" step="0.1" value="5.7" title="Magnitude limit" />
        </label>
        <label title="Controls base star dot size.">Aperture
          <input id="aperture" type="number" step="0.1" value="0.4" title="Star size aperture" />
        </label>
        <label title="Number of points per star when star shapes are enabled.">
          Star points
          <input id="star-points" type="number" min="3" max="12" step="1" value="4" disabled />
        </label>
      </div>
      <div class="row">
      <label title="Adjust the map field of view angle. Wider angles show more sky.">Field of view
         <!--<span class="zoom-out-controls">-->
        <input id="field-of-view" type="number" min="53" max="124" step="5" value="88" title="Field of view angle in degrees" disabled aria-disabled="true"/>
        <span class="zoom-out-hint zoom-out-left">124 deg</span>
        <input id="zoom-out" type="range" min="2" max="3" step="0.1" value="2.5" list="zoom-slider-ticks" title="Field of view angle" />
        <span class="zoom-out-hint zoom-out-right">53 deg</span>
            <!--<span id="zoom-out-readout">2.5</span>
            <span class="zoom-out-ticks" aria-hidden="true">
              <span>-1</span>
              <span>0</span>
              <span>1</span>
            </span>
          </span>-->
          <datalist id="zoom-slider-ticks">
            <option value="2"></option>
            <option value="2.5"></option>
            <option value="3"></option>
          </datalist>
        </label>
    </div>
      <div class="row">
        <label title="Scale applied only to saved SVG dimensions. Preview stays full size.">Download scale (%)
          <input id="download-scale" type="number" min="0.1" step="0.1" value="100" title="Scale applied only to saved SVG dimensions" />
        </label>
      </div>
      <details>
        <summary>Info Text</summary>
          <div class="row">
              <label title="Font used for info text in the generated SVG.">Info font
                <select id="info-font-family">
                  <option value="Inter, sans-serif">Inter</option>
                  <option value="'Space Grotesk', sans-serif">Space Grotesk</option>
                  <option value="Manrope, sans-serif">Manrope</option>
                  <option value="'DM Sans', sans-serif">DM Sans</option>
                  <option value="Nunito, sans-serif">Nunito</option>
                  <option value="Montserrat, sans-serif">Montserrat</option>
                  <option value="Poppins, sans-serif">Poppins</option>
                  <option value="Merriweather, serif">Merriweather</option>
                  <option value="Lora, serif">Lora</option>
                  <option value="'Cormorant Garamond', serif">Cormorant Garamond</option>
                  <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                  <option value="Inconsolata, monospace">Inconsolata</option>
                  <option value="'Playfair Display', serif">Playfair Display</option>
                  <option value="Oswald, sans-serif">Oswald</option>
                </select>
              </label>
              <label title="Info text size in mm. Set to 0 for automatic proportional sizing.">Info font size (mm)
                <input id="info-font-size" type="number" min="0" step="0.1" value="0" />
              </label>
            </div>
            <div class="row">
              <label title="Preview of the info text with the selected font and size.">Preview
              <div id="info-font-preview" class="info-font-preview" aria-live="polite">Info text preview</div>
              </label>
            </div>
      </details>
      <details>
        <summary>Guides</summary>
      <div class="row">
        <label title="Lowest declination used for guide bands.">Declination min (deg)
          <input id="guide-dec-min" type="number" min="-89" max="89" step="1" value="-60" title="Minimum declination for guide bands" />
        </label>
        <label title="Highest declination used for guide bands.">Declination max (deg)
          <input id="guide-dec-max" type="number" min="-89" max="89" step="1" value="60" title="Maximum declination for guide bands" />
        </label>
        <label title="Spacing between declination guide bands.">Declination step (deg)
          <input id="guide-dec-step" type="number" min="1" max="45" step="1" value="30" title="Spacing between declination guide bands" />
        </label>
      </div>
      <div class="row">
        <label title="Meridian guides are drawn from negative to positive this declination range.">Meridian range (deg)
          <input id="guide-meridian-range" type="number" min="1" max="89" step="0.5" value="75" title="Draw meridian guides from -range to +range declination" />
        </label>
        <button id="reset-guide-defaults" type="button">Reset guide defaults</button>
      </div>
      </details>
      <details>
        <summary>Colors</summary>
        <div class="color-palette-layout">
          <div>
            <div class="row">
              <label title="Background color used when transparent background is off.">
                <input id="bg-color" type="color" value="#2d3b62" />
                Background
              </label>
              <label title="Make output background transparent.">
                <input id="transparent-bg" type="checkbox" />
                Transparent background
              </label>
            </div>

            <div class="row">
              <label title="Color used for stars.">
                <input id="star-color" type="color" value="#ffffff" />
                Stars
              </label>
            </div>

            <div class="row">
              <label title="Color used for guide lines.">
                <input id="guide-color" type="color" value="#cfd6ff" />
                Guides
              </label>
            </div>

            <div class="row">
              <label title="Color used for constellation lines.">
                <input id="constellation-color" type="color" value="#ffffff" />
                Constellation
              </label>
            </div>

            <div class="row">
              <label title="Color used for border circle(s) when border is enabled.">
                <input id="border-color" type="color" value="#ffffff" />
                Border
              </label>
            </div>

            <div class="row">
              <label title="Color used for info text labels.">
                <input id="text-color" type="color" value="#ffffff" />
                Text
              </label>
            </div>

          <div class="palette-controls">
            <button id="apply-light-palette" type="button">Apply light palette</button>
            <button id="apply-dark-palette" type="button">Apply dark palette</button>
            <button id="apply-xtool-palette" type="button">Apply Laser palette</button>
          </div>
        </div>
      </details>
      <details>
        <summary>Blank Cutout</summary>
      <div class="row">
        <label title="Enable a blank circular cutout area."><input id="blank-circle" type="checkbox" /> blank circle</label>
        <label title="Radius of the blank circle in millimeters.">Radius (mm)
          <input id="blank-radius" type="number" min="0" step="0.1" value="15" title="Blank circle radius in millimeters" />
        </label>
        <label title="Distance from the map top edge to the blank circle edge in millimeters.">Distance from top edge (mm)
          <input id="blank-distance" type="number" min="0" step="0.1" value="6" title="Distance from map edge to blank circle edge in millimeters" />
        </label>
      </div>
      </details>
      <div class="row">
        <label title="Import settings from an SVG previously generated by this app.">Import SVG settings
          <input id="import-svg-settings" type="file" accept=".svg,image/svg+xml" />
        </label>
        <span id="import-status" class="import-status" aria-live="polite"></span>
      </div>

    </details>

    <div class="row">
      <button id="generate">Generate SVG</button>
      <a id="download" download="starmap.svg" aria-disabled="true">Download</a>
    </div>

    <div id="preview"></div>
  </main>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
